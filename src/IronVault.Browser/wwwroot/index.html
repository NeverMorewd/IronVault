<!DOCTYPE html>
<html>
<head>
  <title>Iron Vault</title>
  <meta charset="UTF-8">
  <!-- Fit to device screen; disable pinch-zoom so the FIRE button never
       triggers browser zoom (Avalonia owns all touch input). -->
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <!-- Android Chrome: colour the address bar to match the game background -->
  <meta name="theme-color" content="#0a0800">
  <!-- Mobile web-app capable (standard, cross-browser) -->
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./app.css" />
</head>
<body>
  <div id="out">
    <div class="avalonia-splash">
      <div class="splash-title">IRON VAULT</div>
      <div class="splash-subtitle">SYSTEM INITIALIZING...</div>
    </div>
  </div>
  <script src="./audio.js"></script>
  <!-- Visual touch controls overlay (pointer-events:none; input via C# PointerEvents) -->
  <script src="./touch-controls.js"></script>
  <script type="module" src="./main.js"></script>
</body>
</html>
