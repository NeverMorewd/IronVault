name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true

# Resolve the effective tag once, available to all jobs as env.RELEASE_TAG.
# On tag-push:  github.ref_name is the tag (e.g. "v1.0.0").
# On manual run: inputs.tag is used.
env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  # ── WASM build ─────────────────────────────────────────────────────────────
  build-wasm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - name: Restore
        run: dotnet restore src/IronVault.Browser/IronVault.Browser.csproj

      - name: Publish WASM
        run: |
          dotnet publish src/IronVault.Browser/IronVault.Browser.csproj \
            -c Release \
            -f net10.0-browser \
            -o publish

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

  # ── Desktop AOT builds ─────────────────────────────────────────────────────
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install native build tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y clang zlib1g-dev

      - name: Restore
        run: dotnet restore src/IronVault.Desktop/IronVault.Desktop.csproj -r ${{ matrix.rid }}

      - name: Publish AOT
        run: |
          dotnet publish src/IronVault.Desktop/IronVault.Desktop.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained \
            -o publish/${{ matrix.rid }}

      - name: Remove PDB files
        run: find publish/${{ matrix.rid }} -name "*.pdb" -delete

      - name: Create zip
        shell: pwsh
        run: |
          $rid = '${{ matrix.rid }}'
          Compress-Archive -Path "publish/$rid/*" -DestinationPath "IronVault-${env:RELEASE_TAG}-${rid}.zip"

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.rid }}
          path: IronVault-*-${{ matrix.rid }}.zip
          retention-days: 1

  # ── Windows installers: EXE (Inno Setup) + MSIX (Microsoft Store) ──────────
  build-installer:
    needs: build-desktop
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download win-x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-win-x64
          path: dl/

      - name: Extract win-x64 zip
        run: |
          $zip = Get-Item dl\*.zip | Select-Object -First 1
          Expand-Archive -Path $zip.FullName -DestinationPath publish\win-x64

      # ── EXE installer via Inno Setup ───────────────────────────────────────
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build EXE installer
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          $tag  = "${{ env.RELEASE_TAG }}"
          $src  = (Resolve-Path publish\win-x64).Path
          $out  = (Resolve-Path .).Path
          & $iscc `
            /DAppVersion="$tag" `
            /DSourceDir="$src"  `
            /DOutputDir="$out"  `
            packaging\windows\setup.iss

      # ── MSIX package for Microsoft Store ──────────────────────────────────
      - name: Locate Windows SDK tools
        id: sdk
        run: |
          $tool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
                    -Recurse -Filter makeappx.exe |
                    Where-Object { $_.FullName -like '*x64*' } |
                    Sort-Object FullName | Select-Object -Last 1
          "makeappx=$($tool.FullName)"                >> $env:GITHUB_OUTPUT
          "signtool=$($tool.DirectoryName)\signtool.exe" >> $env:GITHUB_OUTPUT
          Write-Host "makeappx : $($tool.FullName)"
          Write-Host "signtool : $($tool.DirectoryName)\signtool.exe"

      - name: Generate MSIX logo assets (placeholder — replace with your artwork)
        run: |
          Add-Type -AssemblyName System.Drawing

          function New-Logo([int]$W, [int]$H, [string]$Out) {
            $bmp   = New-Object System.Drawing.Bitmap($W, $H)
            $g     = [System.Drawing.Graphics]::FromImage($bmp)
            $g.SmoothingMode = [System.Drawing.Drawing2D.SmoothingMode]::AntiAlias
            $g.Clear([System.Drawing.Color]::FromArgb(10, 8, 0))

            $amber = New-Object System.Drawing.SolidBrush([System.Drawing.Color]::FromArgb(255, 165,  0))
            $green = New-Object System.Drawing.SolidBrush([System.Drawing.Color]::FromArgb( 46, 125, 50))
            $dkgrn = New-Object System.Drawing.SolidBrush([System.Drawing.Color]::FromArgb( 21,  61, 21))

            $cx = [float]($W / 2); $cy = [float]($H / 2)
            # Left track
            $g.FillRectangle($dkgrn, [float]($cx-$W*0.34f), [float]($cy-$H*0.25f), [float]($W*0.13f), [float]($H*0.50f))
            # Right track
            $g.FillRectangle($dkgrn, [float]($cx+$W*0.21f), [float]($cy-$H*0.25f), [float]($W*0.13f), [float]($H*0.50f))
            # Body
            $g.FillRectangle($green, [float]($cx-$W*0.22f), [float]($cy-$H*0.08f), [float]($W*0.44f), [float]($H*0.33f))
            # Turret
            $g.FillRectangle($amber, [float]($cx-$W*0.12f), [float]($cy-$H*0.28f), [float]($W*0.24f), [float]($H*0.22f))
            # Barrel
            $g.FillRectangle($amber, [float]($cx-$W*0.04f), [float]($cy-$H*0.48f), [float]($W*0.08f), [float]($H*0.24f))

            $g.Dispose()
            $amber.Dispose(); $green.Dispose(); $dkgrn.Dispose()
            New-Item -ItemType Directory -Force (Split-Path $Out) | Out-Null
            $bmp.Save($Out, [System.Drawing.Imaging.ImageFormat]::Png)
            $bmp.Dispose()
          }

          New-Logo  44  44  msix_layout\Assets\Square44x44Logo.png
          New-Logo 150 150  msix_layout\Assets\Square150x150Logo.png
          New-Logo 310 150  msix_layout\Assets\Wide310x150Logo.png
          New-Logo 310 310  msix_layout\Assets\Square310x310Logo.png
          New-Logo  50  50  msix_layout\Assets\StoreLogo.png
          New-Logo 620 300  msix_layout\Assets\SplashScreen.png
          Write-Host "Logo assets generated."

      - name: Prepare MSIX layout
        run: |
          New-Item -ItemType Directory -Force msix_layout | Out-Null

          # Copy all app binaries into the layout root
          Copy-Item publish\win-x64\* msix_layout\ -Recurse -Force

          # Inject the build version into the manifest (tag v1.2.3 → MSIX 1.2.3.0)
          $tag   = "${{ env.RELEASE_TAG }}".TrimStart('v')
          $parts = $tag -split '\.'
          while ($parts.Count -lt 4) { $parts += '0' }
          $ver   = ($parts[0..3] -join '.')
          (Get-Content packaging\windows\AppxManifest.xml -Encoding UTF8) `
            -replace 'Version="1\.0\.0\.0"', "Version=`"$ver`"" |
            Set-Content msix_layout\AppxManifest.xml -Encoding UTF8

          Write-Host "MSIX version: $ver"

      - name: Pack MSIX
        run: |
          # /nv  = skip semantic validation (avoids false positives on CI)
          # /o   = overwrite if exists
          & "${{ steps.sdk.outputs.makeappx }}" pack `
            /d msix_layout /p IronVault.msix /o /nv

      - name: Sign MSIX with a temporary self-signed certificate
        run: |
          # The certificate Subject (CN=...) MUST match Identity/@Publisher in
          # AppxManifest.xml. For production Store submission, update the manifest
          # Publisher field to your Partner Center value and sign with your own cert.
          # For a .msixupload Partner Center upload the Store will re-sign the package.
          $cert = New-SelfSignedCertificate `
            -Type Custom `
            -Subject "CN=IronVaultDev" `
            -KeyUsage DigitalSignature `
            -FriendlyName "IronVault Dev" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -TextExtension @(
              "2.5.29.37={text}1.3.6.1.5.5.7.3.3",
              "2.5.29.19={text}"
            )
          $pwd = ConvertTo-SecureString "IronVaultCI!" -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath cert.pfx -Password $pwd | Out-Null

          & "${{ steps.sdk.outputs.signtool }}" sign `
            /fd SHA256 /f cert.pfx /p "IronVaultCI!" IronVault.msix

          Remove-Item cert.pfx

      - name: Create .msixupload bundle for Partner Center
        run: |
          # .msixupload = zip archive containing one or more .msix files.
          # Upload this file to Microsoft Partner Center → Packages.
          $tag = "${{ env.RELEASE_TAG }}"
          Compress-Archive -Path IronVault.msix `
            -DestinationPath "IronVault-${tag}-x64.msixupload"

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers
          path: |
            IronVault-*-setup.exe
            IronVault-*.msixupload
          retention-days: 1

  # ── Deploy to GitHub Pages ─────────────────────────────────────────────────
  deploy-pages:
    needs: build-wasm
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    concurrency:
      group: pages
      cancel-in-progress: true

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ── Create GitHub Release ──────────────────────────────────────────────────
  create-release:
    needs: [build-desktop, build-installer]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows zip
        uses: actions/download-artifact@v4
        with:
          name: desktop-win-x64

      - name: Download Linux zip
        uses: actions/download-artifact@v4
        with:
          name: desktop-linux-x64

      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          name: installers

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          draft: false
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          generate_release_notes: true
          files: |
            IronVault-*-win-x64.zip
            IronVault-*-linux-x64.zip
            IronVault-*-setup.exe
            IronVault-*.msixupload
