name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; a new push cancels any in-progress run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ── Build ──────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - name: Restore dependencies
        run: dotnet restore src/IronVault.Browser/IronVault.Browser.csproj

      - name: Publish WASM
        run: |
          dotnet publish src/IronVault.Browser/IronVault.Browser.csproj \
            -c Release \
            -f net10.0-browser \
            -o publish

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Microsoft.NET.Sdk.WebAssembly places static web files in publish/wwwroot/
          path: publish/wwwroot

  # ── Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
